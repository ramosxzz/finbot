services:
  finbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finbot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-meta/llama-3.1-8b-instruct}
      DATA_DIR: /app/storage/data
    volumes:
      - finbot-storage:/app/storage

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: finbot-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --url http://finbot:3000
    depends_on:
      - finbot

volumes:
  finbot-storage:
