services:
  finbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finbot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATA_DIR: /app/storage/data
    volumes:
      - finbot-storage:/app/storage

volumes:
  finbot-storage:
