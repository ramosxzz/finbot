<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FinBot — Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinBot" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    :root {
      --bg:          #000000;
      --surface:     #0d0d0d;
      --surface2:    #161616;
      --border:      #242424;
      --accent:      #ffffff;
      --accent-dim:  rgba(255,255,255,0.08);
      --green:       #22d3a4;
      --green-dim:   rgba(34,211,164,0.12);
      --red:         #f87171;
      --red-dim:     rgba(248,113,113,0.12);
      --yellow:      #fbbf24;
      --text:        #f0f0f0;
      --muted:       #606060;
      --card-radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-left: calc(24px + env(safe-area-inset-left));
      padding-right: calc(24px + env(safe-area-inset-right));
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
      width: 100%;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .header-brand .logo {
      width: 32px;
      height: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-brand h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-brand span {
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: 3px;
      font-weight: 400;
    }

    /* ── Month Selector ── */
    .month-select {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
    }

    .month-select label {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .month-select select {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      outline: none;
      max-width: 110px;
    }

    .month-select select option { background: #161616; }

    /* ── Main ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      padding-left: calc(24px + env(safe-area-inset-left));
      padding-right: calc(24px + env(safe-area-inset-right));
      width: 100%;
      overflow-x: hidden;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 18px 20px;
    }

    .card-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-label .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .card.expenses .dot { background: var(--red); }
    .card.income   .dot { background: var(--green); }
    .card.balance  .dot { background: var(--accent); }
    .card.count    .dot { background: var(--yellow); }

    .card-value {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .card.expenses .card-value { color: var(--red); }
    .card.income   .card-value { color: var(--green); }
    .card.balance  .card-value { color: var(--text); }
    .card.count    .card-value { color: var(--yellow); }

    .card-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Charts ── */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1.8fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 20px;
    }

    .chart-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .chart-sub {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .chart-wrap { position: relative; }

    /* ── Category legend ── */
    .cat-legend {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      max-height: 180px;
      overflow-y: auto;
    }

    .cat-legend::-webkit-scrollbar { width: 3px; }
    .cat-legend::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .cat-name {
      font-size: 0.78rem;
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cat-bar-wrap {
      flex: 2;
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .cat-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .cat-val {
      font-size: 0.75rem;
      color: var(--muted);
      width: 64px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* ── Table section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
    }

    .section-count {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 99px;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      width: 100%;
    }

    .filter-select,
    .filter-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.82rem;
      padding: 9px 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      max-width: 100%;
    }

    .filter-select:focus,
    .filter-input:focus { border-color: #444; }

    .filter-select option { background: #161616; }

    .filter-input {
      flex: 1;
      min-width: 0;
      width: 100%;
      cursor: text;
    }

    .filter-input::placeholder { color: var(--muted); }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
    }

    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }

    thead th {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      font-weight: 600;
      padding: 11px 16px;
      text-align: left;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 12px 16px;
      font-size: 0.82rem;
    }

    .td-date {
      color: var(--muted);
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .td-desc {
      font-weight: 500;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
      white-space: nowrap;
    }

    .badge-expense { background: var(--red-dim);   color: var(--red); }
    .badge-income  { background: var(--green-dim); color: var(--green); }

    .td-amount {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-align: right;
    }

    .td-amount.expense { color: var(--red); }
    .td-amount.income  { color: var(--green); }

    .td-id {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: monospace;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      flex-wrap: wrap;
      gap: 8px;
    }

    .pagination-info {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .pagination-btns {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .btn-page {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      min-width: 36px;
      text-align: center;
    }

    .btn-page:hover { background: var(--surface2); border-color: #444; }
    .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-page.active { background: var(--text); border-color: var(--text); color: #000; font-weight: 700; }

    /* ── Empty / Loading ── */
    .state-empty {
      padding: 48px 0;
      text-align: center;
      color: var(--muted);
    }

    .state-empty .icon { font-size: 2rem; margin-bottom: 8px; }
    .state-empty p { font-size: 0.85rem; }

    .loading-bar {
      height: 2px;
      background: linear-gradient(90deg, #fff 0%, transparent 100%);
      animation: loading 1s infinite;
      border-radius: 2px;
      overflow: hidden;
    }

    @keyframes loading {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    /* ── Responsive tablet ── */
    @media (max-width: 1100px) {
      .charts { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px) {
      .cards { grid-template-columns: 1fr 1fr; }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header {
        padding: 12px 16px;
        padding-top: calc(12px + env(safe-area-inset-top));
      }
      main { padding: 16px 14px; }

      .cards {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }

      .card { padding: 14px 14px; }

      .card-value { font-size: 1.25rem; }

      .charts { gap: 10px; margin-bottom: 16px; }
      .chart-card { padding: 16px; }

      .month-select label { display: none; }

      .cat-legend { max-height: 140px; }

      .filters { gap: 6px; }

      .filter-select,
      .filter-input {
        font-size: 16px; /* prevent zoom on iOS */
        padding: 10px 12px;
      }

      thead th { padding: 10px 12px; }
      tbody td { padding: 11px 12px; }

      .td-id { display: none; }
    }

    @media (max-width: 380px) {
      .cards { grid-template-columns: 1fr; }
      .card-value { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="logo">💰</div>
    <h1>FinBot <span>Dashboard</span></h1>
  </div>
  <div class="month-select">
    <label>Período</label>
    <select id="monthSelect"></select>
  </div>
</header>

<main>
  <!-- Cards -->
  <div class="cards">
    <div class="card expenses">
      <div class="card-label"><span class="dot"></span> Gastos</div>
      <div class="card-value" id="card-expenses">—</div>
      <div class="card-sub" id="card-expenses-sub">carregando…</div>
    </div>
    <div class="card income">
      <div class="card-label"><span class="dot"></span> Receitas</div>
      <div class="card-value" id="card-income">—</div>
      <div class="card-sub" id="card-income-sub">carregando…</div>
    </div>
    <div class="card balance">
      <div class="card-label"><span class="dot"></span> Saldo</div>
      <div class="card-value" id="card-balance">—</div>
      <div class="card-sub" id="card-balance-sub">receitas − gastos</div>
    </div>
    <div class="card count">
      <div class="card-label"><span class="dot"></span> Transações</div>
      <div class="card-value" id="card-count">—</div>
      <div class="card-sub" id="card-count-sub">no período</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <div class="chart-card">
      <div class="chart-title">Por categoria</div>
      <div class="chart-sub">Distribuição dos gastos</div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="donutChart"></canvas>
      </div>
      <div class="cat-legend" id="catLegend"></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Gastos diários</div>
      <div class="chart-sub">Evolução ao longo do mês</div>
      <div class="chart-wrap" style="height:260px">
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Transactions -->
  <div class="section-header">
    <span class="section-title">Transações</span>
    <span class="section-count" id="txCount">0 registros</span>
  </div>

  <div class="filters">
    <select class="filter-select" id="filterType">
      <option value="">Todos os tipos</option>
      <option value="expense">Gastos</option>
      <option value="income">Receitas</option>
    </select>
    <select class="filter-select" id="filterCategory">
      <option value="">Todas as categorias</option>
    </select>
    <input class="filter-input" id="filterSearch" type="search" placeholder="Buscar descrição…" autocomplete="off" />
  </div>

  <div class="table-wrap">
    <div id="loadingBar" style="display:none"><div class="loading-bar"></div></div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Tipo</th>
            <th style="text-align:right">Valor</th>
            <th>ID</th>
          </tr>
        </thead>
        <tbody id="txBody"></tbody>
      </table>
    </div>
    <div id="txEmpty" class="state-empty" style="display:none">
      <div class="icon">🔍</div>
      <p>Nenhuma transação encontrada.</p>
    </div>
    <div class="pagination">
      <span class="pagination-info" id="pageInfo">—</span>
      <div class="pagination-btns" id="pageBtns"></div>
    </div>
  </div>
</main>

<script>
  const ROWS_PER_PAGE = 15;
  const CAT_COLORS = {
    Alimentacao: '#f87171',
    Transporte:  '#fb923c',
    Lazer:       '#c084fc',
    Saude:       '#34d399',
    Educacao:    '#60a5fa',
    Moradia:     '#fbbf24',
    Compras:     '#f472b6',
    Servicos:    '#38bdf8',
    Outros:      '#6b7280',
  };

  const fmt = v => 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtDate = iso => new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  const fmtMonth = (y, m) => {
    const n = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return `${n[m - 1]} ${y}`;
  };

  let allTransactions = [];
  let filteredTransactions = [];
  let currentPage = 1;
  let donutChart = null;
  let barChart = null;

  async function init() {
    await loadMonths();
    await loadData();
    setupFilters();
  }

  async function loadMonths() {
    try {
      const months = await apiFetch('/api/months');
      const sel = document.getElementById('monthSelect');
      sel.innerHTML = '';
      if (!months.length) {
        const now = new Date();
        months.push({ year: now.getFullYear(), month: now.getMonth() + 1 });
      }
      months.forEach(({ year, month }) => {
        const opt = document.createElement('option');
        opt.value = `${year}-${month}`;
        opt.textContent = fmtMonth(year, month);
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => loadData());
    } catch (e) { console.error(e); }
  }

  async function loadData() {
    const sel = document.getElementById('monthSelect');
    const [y, m] = sel.value.split('-').map(Number);
    showLoading(true);
    try {
      const [summary, transactions] = await Promise.all([
        apiFetch(`/api/summary?year=${y}&month=${m}`),
        apiFetch(`/api/transactions?year=${y}&month=${m}`),
      ]);
      renderCards(summary);
      renderDonut(summary);
      renderBar(summary);
      allTransactions = transactions;
      applyFilters();
    } catch (e) { console.error(e); }
    finally { showLoading(false); }
  }

  function renderCards(s) {
    document.getElementById('card-expenses').textContent = fmt(s.totalExpenses);
    document.getElementById('card-expenses-sub').textContent = `${s.byCategory.length} categoria(s)`;
    document.getElementById('card-income').textContent = fmt(s.totalIncome);
    const incCount = s.transactionCount - s.byCategory.reduce((a,b) => a + b.count, 0);
    document.getElementById('card-income-sub').textContent = `${incCount} receita(s)`;
    document.getElementById('card-balance').textContent = fmt(s.balance);
    document.getElementById('card-balance-sub').textContent = s.balance >= 0 ? 'positivo ↑' : 'negativo ↓';
    document.getElementById('card-count').textContent = s.transactionCount;
    document.getElementById('card-count-sub').textContent = fmtMonth(s.year, s.month);
  }

  function renderDonut(s) {
    const cats = s.byCategory.slice(0, 8);
    const colors = cats.map(c => CAT_COLORS[c.category] || CAT_COLORS.Outros);
    if (donutChart) donutChart.destroy();
    const ctx = document.getElementById('donutChart').getContext('2d');
    donutChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: cats.map(c => c.category),
        datasets: [{
          data: cats.map(c => c.total),
          backgroundColor: colors,
          borderColor: '#0d0d0d',
          borderWidth: 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        cutout: '70%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${fmt(ctx.raw)}  (${s.totalExpenses > 0 ? ((ctx.raw / s.totalExpenses) * 100).toFixed(1) : 0}%)`
            }
          }
        }
      }
    });

    const legend = document.getElementById('catLegend');
    legend.innerHTML = '';
    const maxVal = cats.reduce((m, c) => Math.max(m, c.total), 0);
    cats.forEach((c, i) => {
      const pct = maxVal > 0 ? (c.total / maxVal) * 100 : 0;
      const row = document.createElement('div');
      row.className = 'cat-row';
      row.onclick = () => filterByCategory(c.category);
      row.innerHTML = `
        <div class="cat-dot" style="background:${colors[i]}"></div>
        <span class="cat-name">${c.category}</span>
        <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${pct}%;background:${colors[i]}"></div></div>
        <span class="cat-val">${fmt(c.total)}</span>`;
      legend.appendChild(row);
    });
  }

  function renderBar(s) {
    const labels = s.dailyExpenses.map(d => d.day);
    const data = s.dailyExpenses.map(d => d.total);
    if (barChart) barChart.destroy();
    const ctx = document.getElementById('barChart').getContext('2d');
    barChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Gastos',
          data,
          backgroundColor: 'rgba(255,255,255,0.12)',
          borderColor: 'rgba(255,255,255,0.35)',
          borderWidth: 1,
          borderRadius: 4,
          borderSkipped: false,
          hoverBackgroundColor: 'rgba(255,255,255,0.22)',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.raw)}` } }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.04)' },
            ticks: { color: '#606060', font: { size: 10 } }
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: {
              color: '#606060',
              font: { size: 10 },
              callback: v => v === 0 ? '' : 'R$' + v.toLocaleString('pt-BR')
            }
          }
        }
      }
    });
  }

  function setupFilters() {
    const sel = document.getElementById('filterCategory');
    Object.keys(CAT_COLORS).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
    document.getElementById('filterType').addEventListener('change', applyFilters);
    document.getElementById('filterCategory').addEventListener('change', applyFilters);
    document.getElementById('filterSearch').addEventListener('input', applyFilters);
  }

  function filterByCategory(cat) {
    document.getElementById('filterCategory').value = cat;
    applyFilters();
    document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth' });
  }

  function applyFilters() {
    const type = document.getElementById('filterType').value;
    const cat  = document.getElementById('filterCategory').value;
    const q    = document.getElementById('filterSearch').value.toLowerCase().trim();
    filteredTransactions = allTransactions.filter(t => {
      if (type && t.type !== type) return false;
      if (cat  && t.category !== cat) return false;
      if (q    && !t.description.toLowerCase().includes(q)) return false;
      return true;
    });
    currentPage = 1;
    renderTable();
  }

  function renderTable() {
    const total = filteredTransactions.length;
    const pages = Math.max(1, Math.ceil(total / ROWS_PER_PAGE));
    const start = (currentPage - 1) * ROWS_PER_PAGE;
    const rows  = filteredTransactions.slice(start, start + ROWS_PER_PAGE);

    document.getElementById('txCount').textContent = `${total} registro${total !== 1 ? 's' : ''}`;
    document.getElementById('pageInfo').textContent =
      total === 0 ? 'Sem resultados' : `${start + 1}–${Math.min(start + ROWS_PER_PAGE, total)} de ${total}`;

    const tbody = document.getElementById('txBody');
    const empty = document.getElementById('txEmpty');

    if (rows.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      tbody.innerHTML = rows.map(t => {
        const color = CAT_COLORS[t.category] || CAT_COLORS.Outros;
        const isExp = t.type === 'expense';
        return `
          <tr>
            <td class="td-date">${fmtDate(t.date)}</td>
            <td class="td-desc" title="${t.description}">${t.description}</td>
            <td><span class="badge" style="background:${color}1a;color:${color}">${t.category}</span></td>
            <td><span class="badge ${isExp ? 'badge-expense' : 'badge-income'}">${isExp ? '↑' : '↓'} ${isExp ? 'gasto' : 'receita'}</span></td>
            <td class="td-amount ${isExp ? 'expense' : 'income'}">${isExp ? '−' : '+'} ${fmt(t.amount)}</td>
            <td class="td-id" title="${t.id}">${t.id.slice(0,8)}</td>
          </tr>`;
      }).join('');
    }
    renderPagination(pages);
  }

  function renderPagination(pages) {
    const container = document.getElementById('pageBtns');
    container.innerHTML = '';
    const add = (label, page, disabled, active) => {
      const b = document.createElement('button');
      b.className = 'btn-page' + (active ? ' active' : '');
      b.textContent = label;
      b.disabled = !!disabled;
      b.onclick = () => { currentPage = page; renderTable(); window.scrollTo({ top: document.querySelector('.section-header').offsetTop - 80, behavior: 'smooth' }); };
      container.appendChild(b);
    };
    add('‹', currentPage - 1, currentPage === 1, false);
    pagRange(currentPage, pages).forEach(p => {
      if (p === '…') {
        const s = document.createElement('span');
        s.textContent = '…';
        s.style.cssText = 'color:#606060;padding:0 4px;font-size:.78rem;line-height:32px';
        container.appendChild(s);
      } else {
        add(p, p, false, p === currentPage);
      }
    });
    add('›', currentPage + 1, currentPage === pages, false);
  }

  function pagRange(cur, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    if (cur <= 4)         return [1,2,3,4,5,'…',total];
    if (cur >= total - 3) return [1,'…',total-4,total-3,total-2,total-1,total];
    return [1,'…',cur-1,cur,cur+1,'…',total];
  }

  async function apiFetch(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  function showLoading(on) {
    document.getElementById('loadingBar').style.display = on ? 'block' : 'none';
  }

  init();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
</body>
</html>
